name: sleep_tracker
description: 智能睡眠监测与分析应用

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  flutter_dotenv: ^5.1.0

  # Supabase
  supabase_flutter: ^2.3.0

  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 导航
  go_router: ^13.1.0

  # UI 组件
  flutter_animate: ^4.5.0
  fl_chart: ^0.67.0
  shimmer: ^3.0.0

  # 时间处理
  intl: ^0.19.0

  # 本地存储（Web 兼容）
  shared_preferences: ^2.2.2

  # 工具
  uuid: ^4.3.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  logger: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - .env